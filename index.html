<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quick Pokédex</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #171c24;
      --panel-2: #202735;
      --line: #303a4d;
      --text: #f2f5f9;
      --muted: #a7b0c0;
      --accent: #ffcb4c;
      --accent-2: #5dd6c4;
      --danger: #ff6b7a;
      --ok: #72e39d;
      --shadow: 0 24px 80px rgba(0, 0, 0, .36);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 30% 20%, rgba(93, 214, 196, .16), transparent 28rem),
        linear-gradient(135deg, #0d1117 0%, #151822 42%, #10141d 100%);
    }

    button, input { font: inherit; }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .mark {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background:
        linear-gradient(#ef4658 0 48%, #151820 48% 55%, #f5f6fa 55% 100%);
      border: 3px solid #11151d;
      box-shadow: inset 0 0 0 4px rgba(255, 255, 255, .08), 0 12px 26px rgba(0, 0, 0, .32);
      position: relative;
      flex: 0 0 auto;
    }

    .mark::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 17px;
      height: 17px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #f7f9fc;
      border: 4px solid #151820;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: .95;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 720px;
      font-size: 1rem;
    }

    .status-pill {
      border: 1px solid var(--line);
      background: rgba(23, 28, 36, .78);
      color: var(--muted);
      border-radius: 999px;
      padding: 10px 14px;
      white-space: nowrap;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .16);
    }

    .search-zone {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      background: rgba(23, 28, 36, .76);
      border: 1px solid var(--line);
      padding: 12px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      z-index: 4;
    }

    .search-wrap { position: relative; }

    input {
      width: 100%;
      min-height: 54px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: #0f141d;
      color: var(--text);
      padding: 0 18px;
      outline: none;
      font-size: 1.05rem;
    }

    input:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(93, 214, 196, .14);
    }

    .go {
      min-height: 54px;
      border: 0;
      border-radius: var(--radius);
      padding: 0 22px;
      background: var(--accent);
      color: #18140a;
      font-weight: 800;
      cursor: pointer;
    }

    .suggestions {
      position: absolute;
      inset: calc(100% + 8px) 0 auto 0;
      background: #111720;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      max-height: 280px;
      overflow-y: auto;
      display: none;
    }

    .suggestions.show { display: block; }

    .suggestion {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      text-align: left;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
    }

    .suggestion:hover, .suggestion.active { background: #202735; }

    .suggestion small { color: var(--muted); }

    main {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 390px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .hero-card, .info-panel, .empty {
      background: rgba(23, 28, 36, .86);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hero-card { overflow: hidden; }

    .poke-stage {
      min-height: 360px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(140deg, rgba(255, 203, 76, .16), transparent 54%),
        linear-gradient(180deg, #242c3b, #161b24);
      position: relative;
    }

    .poke-stage::before {
      content: "";
      position: absolute;
      width: 230px;
      height: 230px;
      border: 2px dashed rgba(255, 255, 255, .14);
      border-radius: 50%;
    }

    .pokemon-img {
      width: min(78%, 292px);
      image-rendering: auto;
      filter: drop-shadow(0 28px 24px rgba(0, 0, 0, .44));
      position: relative;
      z-index: 1;
    }

    .identity {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .name-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    h2 {
      margin: 0;
      font-size: 2rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .dex {
      color: var(--muted);
      font-weight: 800;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      padding: 0 11px;
      font-size: .82rem;
      font-weight: 800;
      color: #11151c;
      text-transform: uppercase;
    }

    .stats {
      display: grid;
      gap: 9px;
    }

    .stat {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) 36px;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: .9rem;
    }

    .bar {
      height: 9px;
      border-radius: 999px;
      background: #0e131b;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: var(--w);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .info-panel {
      padding: 18px;
    }

    .panel-title {
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .move-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .move {
      background: var(--panel-2);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      padding: 14px;
      display: grid;
      gap: 10px;
      min-height: 122px;
    }

    .move b { font-size: 1.12rem; }

    .move small, .note, .mini {
      color: var(--muted);
      line-height: 1.45;
    }

    .matrix {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .list-card {
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, .08);
      background: var(--panel-2);
      padding: 14px;
      min-height: 178px;
    }

    .list-card h3 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .list-card.good h3 { color: var(--ok); }
    .list-card.bad h3 { color: var(--danger); }

    .poke-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .poke-tag {
      border-radius: 999px;
      background: #0f141d;
      border: 1px solid rgba(255, 255, 255, .08);
      padding: 7px 10px;
      color: #dce3ee;
      font-size: .87rem;
    }

    .target-strip {
      margin-top: 12px;
      border-radius: var(--radius);
      border: 1px solid rgba(93, 214, 196, .22);
      background: #0f141d;
      padding: 12px;
    }

    .target-strip h3 {
      margin: 0;
      color: var(--accent-2);
      font-size: 1rem;
    }

    .target-strip .poke-list {
      margin-top: 10px;
    }

    .target-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .target-card {
      min-height: 100px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      background: #151b25;
      padding: 8px 6px;
      display: grid;
      grid-template-rows: 52px auto auto;
      justify-items: center;
      align-items: center;
      gap: 4px;
      text-align: center;
    }

    .target-card img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      image-rendering: auto;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, .28));
    }

    .target-card b {
      max-width: 100%;
      color: #eef4fb;
      font-size: .7rem;
      line-height: 1.08;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .target-card span {
      border-radius: 999px;
      background: rgba(255, 203, 76, .16);
      color: var(--accent);
      border: 1px solid rgba(255, 203, 76, .25);
      padding: 2px 7px;
      font-size: .7rem;
      font-weight: 900;
    }
    .compare-actions {
      display: grid;
      gap: 10px;
    }

    .compare-toggle, .compare-run {
      min-height: 44px;
      border: 0;
      border-radius: var(--radius);
      background: var(--accent-2);
      color: #071512;
      font-weight: 900;
      cursor: pointer;
      padding: 0 16px;
    }

    .compare-box[hidden] { display: none; }

    .compare-box {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .compare-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
    }

    .compare-row input {
      min-height: 44px;
    }

    .compare-result {
      min-height: 44px;
    }

    .compare-card {
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, .08);
      background: #0f141d;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .compare-card.win { border-color: rgba(114, 227, 157, .38); }
    .compare-card.lose { border-color: rgba(255, 107, 122, .42); }
    .compare-card.even { border-color: rgba(255, 203, 76, .35); }

    .compare-head {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
    }

    .compare-head strong {
      font-size: 1.05rem;
    }

    .compare-face {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) 54px;
      gap: 10px;
      align-items: center;
    }

    .compare-face img {
      width: 54px;
      height: 54px;
      object-fit: contain;
    }

    .compare-vs {
      color: var(--muted);
      text-align: center;
      font-weight: 900;
      font-size: .78rem;
    }

    .tips {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .tip {
      background: #0f141d;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      padding: 12px;
      min-height: 94px;
    }

    .tip b {
      display: block;
      margin-bottom: 6px;
      color: var(--accent);
    }

    .view-tabs {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .view-tab {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 28, 36, .78);
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
      padding: 0 14px;
    }

    .view-tab.active {
      background: var(--accent);
      border-color: transparent;
      color: #18140a;
    }

    .league-view {
      grid-column: 1 / -1;
      display: grid;
      gap: 14px;
    }

    .league-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }


    .league-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .league-refresh {
      min-height: 34px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: var(--radius);
      background: rgba(255,255,255,.08);
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
      padding: 0 12px;
    }

    .league-refresh:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .league-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .team-card {
      background: rgba(23, 28, 36, .86);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .team-card h3 {
      margin: 0;
      color: var(--accent-2);
      font-size: 1rem;
    }

    .team-members {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .team-member {
      border-radius: var(--radius);
      background: #0f141d;
      border: 1px solid rgba(255, 255, 255, .08);
      padding: 10px 8px;
      display: grid;
      justify-items: center;
      gap: 6px;
      text-align: center;
      min-height: 132px;
    }

    .team-member img {
      width: 58px;
      height: 58px;
      object-fit: contain;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, .28));
    }

    .team-member b {
      font-size: .78rem;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .team-member small {
      color: var(--muted);
      font-size: .7rem;
    }

    .team-types {
      display: flex;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .team-types .chip {
      min-height: 22px;
      padding: 3px 7px;
      font-size: .64rem;
    }
    .empty {
      grid-column: 1 / -1;
      min-height: 430px;
      display: grid;
      place-items: center;
      padding: 30px;
      text-align: center;
    }

    .empty-inner {
      max-width: 650px;
    }

    .empty h2 {
      font-size: clamp(2rem, 5vw, 4rem);
      margin-bottom: 12px;
    }

    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, .18);
      border-top-color: var(--accent);
      animation: spin .8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    .error {
      color: #ffd8dc;
      background: rgba(255, 107, 122, .12);
      border: 1px solid rgba(255, 107, 122, .28);
      border-radius: var(--radius);
      padding: 12px;
      margin-top: 12px;
      display: none;
    }

    .error.show { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) {
      header, main { grid-template-columns: 1fr; }
      .status-pill { justify-self: start; }
      .hero-card { order: -1; }
      .tips { grid-template-columns: 1fr; }
      .target-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      .league-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 620px) {
      .app { width: min(100% - 20px, 1180px); padding-top: 18px; }
      .brand { align-items: flex-start; }
      .mark { width: 46px; height: 46px; }
      .search-zone, .move-grid, .matrix, .compare-row, .team-members { grid-template-columns: 1fr; }
      .go, .compare-run { width: 100%; }
      .poke-stage { min-height: 280px; }
      .name-row { display: grid; }
      .target-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .target-card { min-height: 96px; }
      .target-card b { font-size: .68rem; }
      .compare-head, .compare-face { grid-template-columns: 1fr; display: grid; text-align: center; justify-items: center; }
      .team-member { grid-template-columns: 54px minmax(0, 1fr); justify-items: start; text-align: left; min-height: 92px; }
      .team-member img { grid-row: span 3; width: 54px; height: 54px; }
      .team-types { justify-content: flex-start; }
      h2 { font-size: 1.65rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>Quick Pokédex</h1>
          <p class="subtitle">Busca rápida por nome ou número, com tipos, atributos, golpes sugeridos e leitura simples de vantagem.</p>
        </div>
      </div>
      <div class="status-pill" id="dataStatus">Carregando Pokédex...</div>
    </header>

    <section class="search-zone" aria-label="Busca de Pokémon">
      <div class="search-wrap">
        <input id="searchInput" type="search" autocomplete="off" placeholder="Digite: arcanine de hisui, pikachu, 25..." aria-label="Nome ou número do Pokémon">
        <div class="suggestions" id="suggestions" role="listbox"></div>
      </div>
      <button class="go" id="searchBtn" type="button">Buscar</button>
    </section>
    <div class="error" id="errorBox"></div>

    <nav class="view-tabs" aria-label="Modos da Pokédex">
      <button class="view-tab active" type="button" data-view="pokedex">Pokédex</button>
      <button class="view-tab" type="button" data-view="great">Grande Liga</button>
      <button class="view-tab" type="button" data-view="ultra">Ultra Liga</button>
    </nav>

    <main id="result">
      <section class="empty">
        <div class="empty-inner">
          <h2>Digite um Pokémon para começar.</h2>
          <p class="note">Experimente <b>arcanine de hisui</b>, <b>charizard</b>, <b>mewtwo</b> ou um número da Pokédex. As sugestões aparecem enquanto você escreve.</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    const GO_API = "https://pokemon-go-api.github.io/pokemon-go-api/api";
    const input = document.querySelector("#searchInput");
    const suggestionsEl = document.querySelector("#suggestions");
    const resultEl = document.querySelector("#result");
    const statusEl = document.querySelector("#dataStatus");
    const errorBox = document.querySelector("#errorBox");
    const searchBtn = document.querySelector("#searchBtn");
    const viewTabs = [...document.querySelectorAll(".view-tab")];

    const typeNames = {
      normal: "Normal", fire: "Fogo", water: "Água", electric: "Elétrico", grass: "Planta",
      ice: "Gelo", fighting: "Lutador", poison: "Veneno", ground: "Terra", flying: "Voador",
      psychic: "Psíquico", bug: "Inseto", rock: "Pedra", ghost: "Fantasma", dragon: "Dragão",
      dark: "Sombrio", steel: "Aço", fairy: "Fada"
    };

    const typeColor = {
      normal: "#a8a77a", fire: "#ee8130", water: "#6390f0", electric: "#f7d02c", grass: "#7ac74c",
      ice: "#96d9d6", fighting: "#c22e28", poison: "#a33ea1", ground: "#e2bf65", flying: "#a98ff3",
      psychic: "#f95587", bug: "#a6b91a", rock: "#b6a136", ghost: "#735797", dragon: "#6f35fc",
      dark: "#705746", steel: "#b7b7ce", fairy: "#d685ad"
    };
    const moveTranslationsPtBR = {
      "Acid": "Ácido", "Acid Spray": "Jato Ácido", "Aerial Ace": "Ás Aéreo", "Air Cutter": "Cortador de Ar", "Air Slash": "Golpe de Ar",
      "Ancient Power": "Poder Ancestral", "Aqua Jet": "Jato de Água", "Aqua Tail": "Cauda Aquática", "Astonish": "Espanto", "Aura Sphere": "Esfera de Aura",
      "Avalanche": "Avalanche", "Bite": "Mordida", "Blast Burn": "Queimadura Explosiva", "Blizzard": "Nevasca", "Body Slam": "Golpe de Corpo",
      "Bone Club": "Clava de Osso", "Brave Bird": "Pássaro Bravo", "Breaking Swipe": "Golpe Devastador", "Brick Break": "Quebra-Tijolo", "Brine": "Salmoura",
      "Brutal Swing": "Balanço Brutal", "Bubble": "Bolha", "Bubble Beam": "Raio de Bolhas", "Bug Bite": "Mordida de Inseto", "Bug Buzz": "Zumbido",
      "Bulldoze": "Pisotear", "Bullet Punch": "Soco Bala", "Bullet Seed": "Semente Bala", "Charge Beam": "Raio de Carga", "Charm": "Encanto",
      "Close Combat": "Combate Corpo a Corpo", "Confusion": "Confusão", "Counter": "Contra-Atacar", "Crabhammer": "Martelo Caranguejo", "Cross Chop": "Golpe Cruzado",

    const aliases = new Map([
      ["arcanine de hisui", "arcanine-hisuian"],
      ["arcanine hisui", "arcanine-hisuian"],

      ["hisuian arcanine", "arcanine-hisuian"],

    let pokemonList = [];
    let pokemonIndex = new Map();
    let typeData = new Map();
    let activeSuggestion = -1;
    let dataReady = null;
    let selectedPokemon = null;
    let currentView = "pokedex";
    const leaguePages = { great: 0, ultra: 0 };

    function normalize(value = "") {
      return String(value)
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[._]/g, "-")
        .replace(/['’]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function slugify(value = "") {
      return normalize(value).replace(/\s+/g, "-");
    }

    function typeSlug(value = "") {
      return String(value)
        .replace(/^POKEMON_TYPE_/i, "")
        .toLowerCase()
        .replace(/_/g, "-");
    }

    function displayName(name = "") {
      return String(name)
        .split("-")
        .filter(Boolean)
        .map(part => part.charAt(0).toUpperCase() + part.slice(1))
        .join(" ");
    }

    function goName(pokemon) {
      return pokemon?.names?.English || pokemon?.id || "Pokémon";
    }

    function goDisplayName(pokemon) {
      const base = goName(pokemon);
      const form = String(pokemon?.formId || "").replace(`${pokemon?.id || ""}_`, "");
      if (!form || form === pokemon?.id || form === "NORMAL") return base;
      const formLabel = displayName(slugify(form));
      if (normalize(base).includes(normalize(formLabel))) return base;
      return `${base} ${formLabel}`;
    }

    function pokemonTypes(pokemon) {
      return [pokemon.primaryType, pokemon.secondaryType]
        .filter(Boolean)
        .map(item => typeSlug(item.type || item.names?.English || item.typeName));
    }

    function moveType(move) {
      return typeSlug(move?.type?.type || move?.type?.names?.English || "normal");
    }

    function fallbackMoveNamePtBR(move) {
      return String(move?.id || "golpe")
        .replace(/_FAST$/i, "")
        .toLowerCase()
        .split("_")
        .filter(Boolean)
        .map(part => fallbackMoveWords[part] || displayName(part))
        .join(" ")
        .replace(/^./, char => char.toUpperCase());
    }

    function moveName(move) {
      const english = move?.names?.English || displayName(slugify(move?.id || "Golpe"));
      return move?.names?.Portuguese || move?.names?.["Portuguese (Brazil)"] || moveTranslationsPtBR[english] || fallbackMoveNamePtBR(move);
    }

    function addIndex(key, pokemon) {
      const normalized = slugify(key);
      if (normalized && !pokemonIndex.has(normalized)) pokemonIndex.set(normalized, pokemon);
    }

    function apiName(value) {
      const term = normalize(value);
      if (!term) return "";
      if (aliases.has(term)) return aliases.get(term);
      const compact = term.replace(/\s+/g, "-");
      return aliases.get(compact) || compact;
    }

    function regionalSearchTerms(formSlug) {
      const terms = [];
      if (formSlug.includes("hisuian")) terms.push("hisui", "de hisui");
      if (formSlug.includes("alolan")) terms.push("alola", "de alola");
      if (formSlug.includes("galarian")) terms.push("galar", "de galar");
      if (formSlug.includes("paldean")) terms.push("paldea", "de paldea");
      return terms.join(" ");
    }

    function findPokemon(term) {
      const compact = slugify(term);
      const exact = pokemonIndex.get(term) || pokemonIndex.get(compact);
      if (exact) return exact;
      const normalized = normalize(term);
      const hit = pokemonList.find(p => p.search.includes(normalized) || p.name.includes(compact));
      return hit?.pokemon || null;
    }

    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Falha ao carregar ${url}`);
      return res.json();
    }

    async function loadList() {
      dataReady = (async () => {
        try {
          const [pokedex, types] = await Promise.all([
            fetchJson(`${GO_API}/pokedex.json`),
            fetchJson(`${GO_API}/types.json`)
          ]);

          typeData = new Map(types.map(type => [typeSlug(type.type), {
            weakFrom: (type.doubleDamageFrom || []).map(typeSlug),
            resistFrom: (type.halfDamageFrom || []).map(typeSlug),
            immuneFrom: (type.noDamageFrom || []).map(typeSlug)
          }]));

          const allPokemon = pokedex.flatMap(pokemon => [
            pokemon,
            ...Object.values(pokemon.regionForms || {})
          ]);

          pokemonIndex = new Map();
          pokemonList = allPokemon.map((pokemon, index) => {
            const name = goName(pokemon);
            const label = goDisplayName(pokemon);
            const slug = slugify(label);
            const baseSlug = slugify(name);
            const idSlug = slugify(pokemon.id);
            const formSlug = slugify(String(pokemon.formId || "").replace(/_/g, " "));
            const entry = {
              pokemon,
              name: slug,
              label,
              search: normalize(`${label} ${name} ${pokemon.id} ${pokemon.formId} ${pokemon.dexNr} ${regionalSearchTerms(formSlug)}`),
              index: pokemon.dexNr || index + 1
            };
            [slug, baseSlug, idSlug, formSlug, `${baseSlug}-${formSlug}`].forEach(key => addIndex(key, pokemon));
            if (!pokemonIndex.has(String(pokemon.dexNr))) pokemonIndex.set(String(pokemon.dexNr), pokemon);
            return entry;
          }).sort((a, b) => a.index - b.index || a.label.localeCompare(b.label));

          aliases.forEach((target, alias) => {
            const pokemon = pokemonIndex.get(target);
            if (pokemon) addIndex(alias, pokemon);
          });

          statusEl.textContent = `${pokemonList.length.toLocaleString("pt-BR")} opções prontas`;
        } catch (err) {
          statusEl.textContent = "Busca online indisponível";
          throw err;
        }
      })();
      return dataReady;
    }

    function suggestionMatches(value) {
      const term = normalize(value);
      if (!term || term.length < 2) return [];
      const aliasHits = [...aliases.entries()]
        .filter(([label]) => label.includes(term))
        .map(([label, name]) => {
          const pokemon = pokemonIndex.get(name);
          return pokemon ? { pokemon, name, label: `${goDisplayName(pokemon)} (${label})`, index: "forma" } : null;
        })
        .filter(Boolean);
      const hits = pokemonList
        .filter(p => p.search.includes(term) || String(p.index) === term)
        .slice(0, 8);
      return [...aliasHits, ...hits]
        .filter((hit, idx, arr) => arr.findIndex(x => x.pokemon === hit.pokemon) === idx)
        .slice(0, 8);
    }

    function suggestionButtons(matches) {
      return matches.map((p, idx) => `
        <button class="suggestion" type="button" data-name="${p.name}" data-label="${p.label || goDisplayName(p.pokemon)}" data-idx="${idx}" role="option">
          <span>${p.label || goDisplayName(p.pokemon)}</span>
          <small>${typeof p.index === "number" ? "#" + String(p.index).padStart(3, "0") : p.index}</small>
        </button>
      `).join("");
    }

    function renderSuggestions() {
      activeSuggestion = -1;
      const merged = suggestionMatches(input.value);
      if (!merged.length) {
        suggestionsEl.classList.remove("show");
        suggestionsEl.innerHTML = "";
        return;
      }
      suggestionsEl.innerHTML = suggestionButtons(merged);
      suggestionsEl.classList.add("show");

    function renderCompareSuggestions() {
      const compareInput = document.querySelector("#compareInput");
      const compareSuggestions = document.querySelector("#compareSuggestions");
      if (!compareInput || !compareSuggestions) return;
      activeCompareSuggestion = -1;
      const merged = suggestionMatches(compareInput.value);
      if (!merged.length) {
        compareSuggestions.classList.remove("show");
        compareSuggestions.innerHTML = "";
        return;
      }
      compareSuggestions.innerHTML = suggestionButtons(merged);
      compareSuggestions.classList.add("show");
    }

    function incomingEffectiveness(attackType, defenderTypes) {
      return defenderTypes.reduce((value, defenderType) => {
        const data = typeData.get(defenderType) || {};
        if (data.immuneFrom?.includes(attackType)) return value * 0;
        if (data.weakFrom?.includes(attackType)) return value * 2;
        if (data.resistFrom?.includes(attackType)) return value * 0.5;
        return value;
      }, 1);
    }

    function incomingWeaknesses(types) {
      return Object.keys(typeNames)
        .map(type => ({ type, value: incomingEffectiveness(type, types) }))
        .filter(item => item.value > 1)
        .sort((a, b) => b.value - a.value || typeNames[a.type].localeCompare(typeNames[b.type]));
    }

    function incomingResistances(types) {
      return Object.keys(typeNames)
        .map(type => ({ type, value: incomingEffectiveness(type, types) }))
        .filter(item => item.value < 1)
        .sort((a, b) => a.value - b.value || typeNames[a.type].localeCompare(typeNames[b.type]));
    }

    function scoreFastMove(move, types) {
      const combat = move.combat || {};
      const turns = Math.max(1, combat.turns || Math.round((move.durationMs || 1000) / 500));
      const power = combat.power ?? move.power ?? 0;
      const energy = combat.energy ?? move.energy ?? 0;
      const stab = types.includes(moveType(move)) ? 1.2 : 1;
      return ((power / turns) * 1.15 + (energy / turns) * 1.35) * stab;
    }

    function scoreChargedMove(move, types) {
      const combat = move.combat || {};
      const power = combat.power ?? move.power ?? 0;
      const energy = Math.abs(combat.energy ?? move.energy ?? 100) || 100;
      const stab = types.includes(moveType(move)) ? 1.2 : 1;
      const buffBonus = combat.buffs ? 8 : 0;
      return ((power / energy) * 100 + Math.max(0, 70 - energy) * 0.25 + buffBonus) * stab;
    }

    function uniqueMoves(moves) {
      const seen = new Set();
      return moves.filter(move => {
        const key = move?.id || moveName(move);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function pickMoves(pokemon, types) {
      const fastMoves = uniqueMoves([
        ...Object.values(pokemon.quickMoves || {}),
        ...Object.values(pokemon.eliteQuickMoves || {})
      ]).sort((a, b) => scoreFastMove(b, types) - scoreFastMove(a, types));
      const chargedMoves = uniqueMoves([
        ...Object.values(pokemon.cinematicMoves || {}),
        ...Object.values(pokemon.eliteCinematicMoves || {})
      ]).sort((a, b) => scoreChargedMove(b, types) - scoreChargedMove(a, types));
      const fast = fastMoves[0];
      const charged = chargedMoves.slice(0, 2);
      const attackTypes = [...new Set([fast, ...charged].filter(Boolean).map(moveType))];
      const fastLabel = fast ? `${moveName(fast)} (${typeNames[moveType(fast)] || moveType(fast)})` : "Sem ataque rápido na API";
      const chargedLabel = charged.length ? charged.map(move => `${moveName(move)} (${typeNames[moveType(move)] || moveType(move)})`).join(" + ") : "Sem ataque carregado na API";
      const chargedTypes = charged.map(move => typeNames[moveType(move)]).filter(Boolean).join(" / ");
      return {
        fast: fastLabel,
        charged: chargedLabel,
        attackTypes: attackTypes.length ? attackTypes : types,
        source: "Pokémon GO API",
        note: chargedTypes ? `Cobertura: ${chargedTypes}.` : ""
      };
    }

    function targetLimit() {
      return 10;
    }

    function easyTargets(currentPokemon, attackTypes) {
      const seen = new Set();
      const limit = targetLimit();
      return pokemonList
        .map(entry => entry.pokemon)
        .filter(target => target && target.formId !== currentPokemon.formId)
        .map(target => {
          const targetTypes = pokemonTypes(target);
          const best = attackTypes
            .map(type => ({ type, value: incomingEffectiveness(type, targetTypes) }))
            .sort((a, b) => b.value - a.value)[0];
          return { pokemon: target, type: best?.type, value: best?.value || 1 };
        })
        .filter(target => target.value > 1)
        .sort((a, b) => b.value - a.value || (a.pokemon.dexNr || 9999) - (b.pokemon.dexNr || 9999))
        .filter(target => {
          const key = goDisplayName(target.pokemon).replace(/^(Alolan|Galarian|Hisuian|Paldean) /, "");
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .slice(0, limit);
    }

    function pokemonImage(pokemon) {
      return pokemon.assets?.image || pokemon.assetForms?.find(form => !form.costume)?.image || "";
    }

    function goPower(pokemon) {
      const stats = pokemon.stats || {};
      return Math.max(1, (stats.attack || 1) * Math.sqrt((stats.defense || 1) * (stats.stamina || 1)));
    }

    function bestAttackValue(attackTypes, defenderTypes) {
      return Math.max(...attackTypes.map(type => incomingEffectiveness(type, defenderTypes)), 1);
    }

    function comparePokemon(attacker, defender) {
      const attackerTypes = pokemonTypes(attacker);
      const defenderTypes = pokemonTypes(defender);
      const attackerMoves = pickMoves(attacker, attackerTypes);
      const defenderMoves = pickMoves(defender, defenderTypes);
      const attackerHit = bestAttackValue(attackerMoves.attackTypes, defenderTypes);
      const defenderHit = bestAttackValue(defenderMoves.attackTypes, attackerTypes);
      const attackerScore = goPower(attacker) * attackerHit;
      const defenderScore = goPower(defender) * defenderHit;
      const ratio = attackerScore / defenderScore;
      const state = ratio > 1.12 ? "win" : ratio < 0.89 ? "lose" : "even";
      const title = state === "win" ? "Tende a ganhar" : state === "lose" ? "Tende a perder" : "Equilibrado";
      return { attackerMoves, defenderMoves, attackerHit, defenderHit, state, title };
    }

    function runCompare() {
      const inputEl = document.querySelector("#compareInput");
      const outputEl = document.querySelector("#compareResult");
      if (!inputEl || !outputEl || !selectedPokemon) return;
      const opponent = findPokemon(apiName(inputEl.value));
      if (!opponent) {
        outputEl.innerHTML = `<div class="compare-card lose"><strong>Não encontrei esse oponente.</strong></div>`;
        return;
      }
      const result = comparePokemon(selectedPokemon, opponent);
      const selectedImage = pokemonImage(selectedPokemon);
      const opponentImage = pokemonImage(opponent);
      outputEl.innerHTML = `
        <div class="compare-card ${result.state}">
          <div class="compare-head"><strong>${result.title}</strong><span class="mini">${result.attackerHit}x contra ${result.defenderHit}x</span></div>
          <div class="compare-face">
            ${selectedImage ? `<img src="${selectedImage}" alt="${goDisplayName(selectedPokemon)}">` : ""}
            <div class="compare-vs">${goDisplayName(selectedPokemon)} vs ${goDisplayName(opponent)}</div>
            ${opponentImage ? `<img src="${opponentImage}" alt="${goDisplayName(opponent)}">` : ""}
          </div>
          <div class="chips">${pokemonTypes(opponent).map(typeChip).join("")}</div>
        </div>
      `;
    }
    function goStats(pokemon) {
      return [
        { label: "HP", value: pokemon.stats?.stamina || 0 },
        { label: "ATQ", value: pokemon.stats?.attack || 0 },
        { label: "DEF", value: pokemon.stats?.defense || 0 }
      ];
    }

    function renderPokemon(pokemon) {
      const types = pokemonTypes(pokemon);
      const moves = pickMoves(pokemon, types);
      const weaknesses = incomingWeaknesses(types);
      const resistances = incomingResistances(types);
      selectedPokemon = pokemon;
      const image = pokemonImage(pokemon);
      const idLabel = pokemon.dexNr ? `#${String(pokemon.dexNr).padStart(3, "0")}` : "Forma especial";
      const weakTypeChips = weaknesses.map(w => typeChip(w.type, w.value === 4 ? "4x" : "2x")).join("");
      const resistTypeChips = resistances.map(r => typeChip(r.type, r.value === 0 ? "0x" : r.value === 0.25 ? "1/4x" : "1/2x")).join("");
      const targets = easyTargets(pokemon, moves.attackTypes);
      const targetTags = targets.map(target => { const targetImage = target.pokemon.assets?.image || target.pokemon.assetForms?.find(form => !form.costume)?.image || ""; return `<div class="target-card">${targetImage ? `<img src="${targetImage}" alt="${goDisplayName(target.pokemon)}">` : ""}<b>${goDisplayName(target.pokemon)}</b><span>${target.value === 4 ? "4x" : "2x"}</span></div>`; }).join("");
      const targetTypes = [...new Set(targets.map(target => target.type).filter(Boolean))].slice(0, 4).map(type => typeNames[type]).join(" / ");

      resultEl.innerHTML = `
        <aside class="hero-card">
          <div class="poke-stage">
            ${image ? `<img class="pokemon-img" src="${image}" alt="${goDisplayName(pokemon)}">` : ""}
          </div>
          <div class="identity">
            <div class="name-row">
              <div>
                <h2>${goDisplayName(pokemon)}</h2>
                <div class="chips" style="margin-top:10px">${types.map(typeChip).join("")}</div>
              </div>
              <div class="dex">${idLabel}</div>
            </div>            <div class="stats">
              ${goStats(pokemon).map(s => {
                const pct = Math.min(100, Math.round((s.value / 300) * 100));
                return `<div class="stat"><span>${s.label}</span><div class="bar"><span style="--w:${pct}%"></span></div><b>${s.value}</b></div>`;
              }).join("")}
            </div>
          </div>
        </aside>

        <section class="stack">
          <div class="info-panel">
            <h2 class="panel-title">Melhores ataques <span>${moves.source}</span></h2>
            <div class="move-grid">
              <div class="move">
                <small>Melhor ataque rápido</small>
                <b>${moves.fast}</b>              </div>
              <div class="move">
                <small>Melhores ataques carregados</small>
                <b>${moves.charged}</b>              </div>
            </div>
            ${moves.note ? `<p class="note" style="margin-bottom:0">${moves.note}</p>` : ""}
          </div>

          <div class="info-panel">
            <h2 class="panel-title">Vantagem de tipos</h2>
            <div class="matrix">
              <div class="list-card good">
                <h3>Resistências</h3>
                <div class="chips">${resistTypeChips || "<span class='mini'>Sem resistências registradas na API.</span>"}</div>
                <div class="poke-list"><span class="mini">Tipos de golpe que causam menos dano contra este Pokémon.</span></div>
              </div>
              <div class="list-card bad">
                <h3>Fraquezas</h3>
                <div class="chips">${weakTypeChips || "<span class='mini'>Sem fraquezas registradas na API.</span>"}</div>
                <div class="poke-list"><span class="mini">Tipos de golpe que causam mais dano contra este Pokémon.</span></div>
              </div>
            </div>
            <div class="target-strip">
              <h3>Alvos fáceis para atacar</h3>
              <div class="target-grid">${targetTags || "<span class='mini'>Sem alvos super efetivos encontrados para os melhores golpes.</span>"}</div>
            </div>
          </div>

          <div class="info-panel">
            <h2 class="panel-title">Comparar <span>Duelo rápido</span></h2>
            <div class="compare-actions">
              <button class="compare-toggle" type="button">Comparar com outro Pokémon</button>
              <div class="compare-box" id="compareBox" hidden>
                <div class="compare-row">
                  <div class="search-wrap"><input id="compareInput" type="search" autocomplete="off" placeholder="Digite o oponente: dragonite, snorlax, 149..." aria-label="Pokémon oponente"><div class="suggestions compare-suggestions" id="compareSuggestions" role="listbox"></div></div>
                  <button class="compare-run" type="button">Ver</button>
                </div>
                <div class="compare-result" id="compareResult"></div>
              </div>
            </div>
          </div>
        </section>
      `;
    }


    function setActiveView(view) {
      currentView = view;
      viewTabs.forEach(tab => tab.classList.toggle("active", tab.dataset.view === view));
    }

    function estimateMaxCp(pokemon) {
      const stats = pokemon.stats || {};
      const attack = stats.attack || 1;
      const defense = stats.defense || 1;
      const stamina = stats.stamina || 1;
      const maxLevelMultiplier = 0.8403;
      return Math.floor((attack * Math.sqrt(defense) * Math.sqrt(stamina) * maxLevelMultiplier * maxLevelMultiplier) / 10);
    }

    function leagueFitScore(pokemon, cap) {
      const stats = pokemon.stats || {};
      const attack = stats.attack || 1;
      const defense = stats.defense || 1;
      const stamina = stats.stamina || 1;
      const maxCp = estimateMaxCp(pokemon);
      if (maxCp < cap * 0.72) return 0;
      const cpRatio = Math.min(1, maxCp / cap);
      const bulk = Math.sqrt(defense * stamina) / Math.max(60, attack);
      const types = pokemonTypes(pokemon);
      const moves = pickMoves(pokemon, types);
      const coverage = new Set(moves.attackTypes).size;
      const weaknesses = incomingWeaknesses(types).length;
      const resistances = incomingResistances(types).length;
      return cpRatio * 100 + bulk * 18 + coverage * 8 + resistances * 3 - weaknesses * 2;
    }

    function leagueCandidates(cap) {
      const seen = new Set();
      return pokemonList
        .map(entry => entry.pokemon)
        .filter(pokemon => pokemon?.stats && pokemon.quickMoves && pokemon.cinematicMoves)
        .map(pokemon => ({ pokemon, score: leagueFitScore(pokemon, cap), maxCp: estimateMaxCp(pokemon) }))
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score)
        .filter(item => {
          const key = goDisplayName(item.pokemon).replace(/^(Alolan|Galarian|Hisuian|Paldean) /, "");
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .slice(0, 60);
    }

    function teamPenalty(team) {
      const weakCounts = new Map();
      const attackTypes = new Set();
      team.forEach(member => {
        const types = pokemonTypes(member.pokemon);
        incomingWeaknesses(types).forEach(item => weakCounts.set(item.type, (weakCounts.get(item.type) || 0) + 1));
        pickMoves(member.pokemon, types).attackTypes.forEach(type => attackTypes.add(type));
      });
      const sharedWeaknessPenalty = [...weakCounts.values()].filter(count => count > 1).reduce((sum, count) => sum + count * 12, 0);
      return sharedWeaknessPenalty - attackTypes.size * 7;
    }

    function coreLeagueItem(pokemon, cap) {
      return { pokemon, score: Math.max(35, leagueFitScore(pokemon, cap)), maxCp: estimateMaxCp(pokemon) };
    }

    function partnerValue(candidate, team) {
      const candidateTypes = pokemonTypes(candidate.pokemon);
      const candidateMoves = pickMoves(candidate.pokemon, candidateTypes);
      const coverage = team.reduce((sum, member) => {
        const memberTypes = pokemonTypes(member.pokemon);
        const memberMoves = pickMoves(member.pokemon, memberTypes);
        return sum + bestAttackValue(candidateMoves.attackTypes, memberTypes) * 10 + bestAttackValue(memberMoves.attackTypes, candidateTypes) * 6;
      }, 0);
      return candidate.score + coverage - teamPenalty([...team, candidate]);
    }

    function generateLeagueTeams(cap, corePokemon, page = 0) {
      const core = coreLeagueItem(corePokemon, cap);
      const candidates = leagueCandidates(cap).filter(item => item.pokemon.formId !== corePokemon.formId);
      const firstPartners = candidates
        .map(item => ({ item, value: partnerValue(item, [core]) }))
        .sort((a, b) => b.value - a.value)
        .slice(0, 36)
        .map(entry => entry.item);
      const teams = [];
      firstPartners.forEach(first => {
        const seconds = candidates
          .filter(item => item.pokemon.formId !== first.pokemon.formId)
          .map(item => ({ item, value: partnerValue(item, [core, first]) }))
          .sort((a, b) => b.value - a.value)
          .slice(0, 4)
          .map(entry => entry.item);
        seconds.forEach(second => {
          const team = [core, first, second];
          teams.push({ members: team, score: team.reduce((sum, item) => sum + item.score, 0) - teamPenalty(team) });
        });
      });
      const unique = [];
      const seen = new Set();
      teams.sort((a, b) => b.score - a.score).forEach(team => {
        const key = team.members.map(item => item.pokemon.formId).sort().join("|");
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(team);
        }
      });
      if (unique.length <= 6) return unique;
      const start = ((page * 6) % unique.length + unique.length) % unique.length;
      return [...unique.slice(start), ...unique.slice(0, start)].slice(0, 6);
    }
    function renderLeague(view) {
      const isUltra = view === "ultra";
      const cap = isUltra ? 2500 : 1500;
      const title = isUltra ? "Ultra Liga" : "Grande Liga";
      if (!selectedPokemon) {
        resultEl.innerHTML = `<section class="empty"><div class="empty-inner"><h2>Pesquise um Pokémon primeiro.</h2><p class="note">Depois abra ${title} para montar equipes com ele.</p></div></section>`;
        return;
      }
      resultEl.innerHTML = `<section class="empty"><div><span class="loader"></span>Montando equipes da ${title} com ${goDisplayName(selectedPokemon)}...</div></section>`;
      dataReady.then(() => {
        const page = leaguePages[view] || 0;
        const teams = generateLeagueTeams(cap, selectedPokemon, page);
        resultEl.innerHTML = `
          <section class="league-view">
            <div class="info-panel league-head">
              <h2 class="panel-title" style="margin:0">Equipes com ${goDisplayName(selectedPokemon)} <span>${title}</span></h2>
              <div class="league-actions">
                <div class="chips"><span class="chip" style="background:#5dd6c4">CP até ${cap}</span></div>
                <button class="league-refresh" type="button" data-view="${view}">Gerar novas opções</button>
              </div>
            </div>
            <div class="league-grid">
              ${teams.map((team, idx) => teamCard(team, idx + 1, cap)).join("") || `<article class="team-card"><h3>Sem equipes suficientes</h3><span class="mini">Esse Pokémon não tem dados suficientes para montar times nessa liga.</span></article>`}
            </div>
          </section>
        `;
      }).catch(() => {
        resultEl.innerHTML = `<section class="empty"><div class="empty-inner"><h2>Não consegui carregar as equipes.</h2><p class="note">Confira sua conexão e tente novamente.</p></div></section>`;
      });
    }

    function teamCard(team, number, cap) {
      return `
        <article class="team-card">
          <h3>Equipe ${number}</h3>
          <div class="team-members">
            ${team.members.map((item, idx) => teamMember(item.pokemon, idx, cap)).join("")}
          </div>
        </article>
      `;
    }

    function teamMember(pokemon, idx, cap) {
      const roles = ["Abertura", "Cobertura", "Fechador"];
      const image = pokemonImage(pokemon);
      const types = pokemonTypes(pokemon);
      const moves = pickMoves(pokemon, types);
      const cp = Math.min(cap, estimateMaxCp(pokemon));
      return `
        <div class="team-member">
          ${image ? `<img src="${image}" alt="${goDisplayName(pokemon)}">` : ""}
          <b>${goDisplayName(pokemon)}</b>
          <small>${roles[idx]} · CP ${cp}</small>
          <div class="team-types">${types.map(typeChip).join("")}</div>
          <small>${moves.fast.split(" (")[0]} · ${moves.charged.split(" + ")[0].split(" (")[0]}</small>
        </div>
      `;
    }
    function typeChip(type, suffix = "") {
      const color = typeColor[type] || "#cbd5e1";
      return `<span class="chip" style="background:${color}">${typeNames[type] || type}${suffix ? " " + suffix : ""}</span>`;
    }

    async function search(value = input.value) {
      setActiveView("pokedex");
      const term = apiName(value);
      if (!term) return;
      errorBox.classList.remove("show");
      suggestionsEl.classList.remove("show");
      resultEl.innerHTML = `<section class="empty"><div><span class="loader"></span>Buscando ${value}...</div></section>`;
      try {
        await dataReady;
        const pokemon = findPokemon(term);
        if (!pokemon) throw new Error("not-found");
        input.value = goDisplayName(pokemon);
        renderPokemon(pokemon);
      } catch (err) {
        resultEl.innerHTML = `<section class="empty"><div class="empty-inner"><h2>Não encontrei esse Pokémon.</h2><p class="note">Tente o nome em inglês, número da Pokédex ou uma forma como <b>arcanine de hisui</b>.</p></div></section>`;
        errorBox.textContent = "Não foi possível carregar esse Pokémon. Confira a grafia ou sua conexão.";
        errorBox.classList.add("show");
      }
    }

    input.addEventListener("input", renderSuggestions);
    input.addEventListener("keydown", event => {
      const items = [...suggestionsEl.querySelectorAll(".suggestion")];
      if (event.key === "ArrowDown" && items.length) {
        event.preventDefault();
        activeSuggestion = (activeSuggestion + 1) % items.length;
      } else if (event.key === "ArrowUp" && items.length) {
        event.preventDefault();
        activeSuggestion = (activeSuggestion - 1 + items.length) % items.length;
      } else if (event.key === "Enter") {
        event.preventDefault();
        const chosen = items[activeSuggestion];
        search(chosen?.dataset.name || input.value);
      } else if (event.key === "Escape") {
        suggestionsEl.classList.remove("show");
      }
      items.forEach((item, idx) => item.classList.toggle("active", idx === activeSuggestion));
    });

    suggestionsEl.addEventListener("click", event => {
      const btn = event.target.closest(".suggestion");
      if (btn) search(btn.dataset.name);
    });
    resultEl.addEventListener("click", event => {
      const toggle = event.target.closest(".compare-toggle");
      if (toggle) {
        const box = document.querySelector("#compareBox");
        if (box) {
          box.hidden = !box.hidden;
          if (!box.hidden) document.querySelector("#compareInput")?.focus();
        }
      }
      const compareSuggestion = event.target.closest("#compareSuggestions .suggestion");
      if (compareSuggestion) {
        const compareInput = document.querySelector("#compareInput");
        const compareSuggestions = document.querySelector("#compareSuggestions");
        if (compareInput) compareInput.value = compareSuggestion.dataset.label || compareSuggestion.dataset.name;
        if (compareSuggestions) compareSuggestions.classList.remove("show");
        runCompare();
      }
      if (event.target.closest(".compare-run")) runCompare();
      const leagueRefresh = event.target.closest(".league-refresh");
      if (leagueRefresh) {
        const view = leagueRefresh.dataset.view || currentView;
        leaguePages[view] = (leaguePages[view] || 0) + 1;
        setActiveView(view);
        renderLeague(view);
      }
    });

    resultEl.addEventListener("input", event => {
      if (event.target.closest("#compareInput")) renderCompareSuggestions();
    });

    resultEl.addEventListener("keydown", event => {
      const compareInput = event.target.closest("#compareInput");
      if (!compareInput) return;
      const compareSuggestions = document.querySelector("#compareSuggestions");
      const items = [...(compareSuggestions?.querySelectorAll(".suggestion") || [])];
      if (event.key === "ArrowDown" && items.length) {
        event.preventDefault();
        activeCompareSuggestion = (activeCompareSuggestion + 1) % items.length;
      } else if (event.key === "ArrowUp" && items.length) {
        event.preventDefault();
        activeCompareSuggestion = (activeCompareSuggestion - 1 + items.length) % items.length;
      } else if (event.key === "Enter") {
        event.preventDefault();
        const chosen = items[activeCompareSuggestion];
        if (chosen) {
          compareInput.value = chosen.dataset.label || chosen.dataset.name;
          compareSuggestions?.classList.remove("show");
        }
        runCompare();
      } else if (event.key === "Escape") {
        compareSuggestions?.classList.remove("show");
      }
      items.forEach((item, idx) => item.classList.toggle("active", idx === activeCompareSuggestion));
    });

    document.addEventListener("click", event => {
      if (!event.target.closest(".search-zone")) suggestionsEl.classList.remove("show");
      if (!event.target.closest(".compare-box")) document.querySelector("#compareSuggestions")?.classList.remove("show");
    });

    viewTabs.forEach(tab => {
      tab.addEventListener("click", () => {
        const view = tab.dataset.view;
        setActiveView(view);
        if (view === "pokedex") {
          resultEl.innerHTML = `<section class="empty"><div class="empty-inner"><h2>Digite um Pokémon para começar.</h2><p class="note">Experimente <b>arcanine de hisui</b>, <b>charizard</b>, <b>mewtwo</b> ou um número da Pokédex. As sugestões aparecem enquanto você escreve.</p></div></section>`;
          return;
        }
        renderLeague(view);
      });
    });
    searchBtn.addEventListener("click", () => search());
    loadList();
  </script>
</body>
</html>
