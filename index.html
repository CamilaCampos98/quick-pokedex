<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quick Pokédex</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #171c24;
      --panel-2: #202735;
      --line: #303a4d;
      --text: #f2f5f9;
      --muted: #a7b0c0;
      --accent: #ffcb4c;
      --accent-2: #5dd6c4;
      --danger: #ff6b7a;
      --ok: #72e39d;
      --shadow: 0 24px 80px rgba(0, 0, 0, .36);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 30% 20%, rgba(93, 214, 196, .16), transparent 28rem),
        linear-gradient(135deg, #0d1117 0%, #151822 42%, #10141d 100%);
    }

    button, input { font: inherit; }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .mark {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background:
        linear-gradient(#ef4658 0 48%, #151820 48% 55%, #f5f6fa 55% 100%);
      border: 3px solid #11151d;
      box-shadow: inset 0 0 0 4px rgba(255, 255, 255, .08), 0 12px 26px rgba(0, 0, 0, .32);
      position: relative;
      flex: 0 0 auto;
    }

    .mark::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 17px;
      height: 17px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #f7f9fc;
      border: 4px solid #151820;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: .95;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 720px;
      font-size: 1rem;
    }

    .status-pill {
      border: 1px solid var(--line);
      background: rgba(23, 28, 36, .78);
      color: var(--muted);
      border-radius: 999px;
      padding: 10px 14px;
      white-space: nowrap;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .16);
    }

    .search-zone {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      background: rgba(23, 28, 36, .76);
      border: 1px solid var(--line);
      padding: 12px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      z-index: 4;
    }

    .search-wrap { position: relative; }

    input {
      width: 100%;
      min-height: 54px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: #0f141d;
      color: var(--text);
      padding: 0 18px;
      outline: none;
      font-size: 1.05rem;
    }

    input:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(93, 214, 196, .14);
    }

    .go {
      min-height: 54px;
      border: 0;
      border-radius: var(--radius);
      padding: 0 22px;
      background: var(--accent);
      color: #18140a;
      font-weight: 800;
      cursor: pointer;
    }

    .suggestions {
      position: absolute;
      inset: calc(100% + 8px) 0 auto 0;
      background: #111720;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      max-height: 280px;
      overflow-y: auto;
      display: none;
    }

    .suggestions.show { display: block; }

    .suggestion {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      text-align: left;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
    }

    .suggestion:hover, .suggestion.active { background: #202735; }

    .suggestion small { color: var(--muted); }

    main {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 390px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .hero-card, .info-panel, .empty {
      background: rgba(23, 28, 36, .86);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hero-card { overflow: hidden; }

    .poke-stage {
      min-height: 360px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(140deg, rgba(255, 203, 76, .16), transparent 54%),
        linear-gradient(180deg, #242c3b, #161b24);
      position: relative;
    }

    .poke-stage::before {
      content: "";
      position: absolute;
      width: 230px;
      height: 230px;
      border: 2px dashed rgba(255, 255, 255, .14);
      border-radius: 50%;
    }

    .pokemon-img {
      width: min(78%, 292px);
      image-rendering: auto;
      filter: drop-shadow(0 28px 24px rgba(0, 0, 0, .44));
      position: relative;
      z-index: 1;
    }

    .identity {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .name-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    h2 {
      margin: 0;
      font-size: 2rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .dex {
      color: var(--muted);
      font-weight: 800;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      padding: 0 11px;
      font-size: .82rem;
      font-weight: 800;
      color: #11151c;
      text-transform: uppercase;
    }

    .stats {
      display: grid;
      gap: 9px;
    }

    .stat {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) 36px;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: .9rem;
    }

    .bar {
      height: 9px;
      border-radius: 999px;
      background: #0e131b;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: var(--w);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .info-panel {
      padding: 18px;
    }

    .panel-title {
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .move-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .move {
      background: var(--panel-2);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      padding: 14px;
      display: grid;
      gap: 10px;
      min-height: 122px;
    }

    .move b { font-size: 1.12rem; }

    .move small, .note, .mini {
      color: var(--muted);
      line-height: 1.45;
    }

    .matrix {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .list-card {
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, .08);
      background: var(--panel-2);
      padding: 14px;
      min-height: 178px;
    }

    .list-card h3 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .list-card.good h3 { color: var(--ok); }
    .list-card.bad h3 { color: var(--danger); }

    .poke-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .poke-tag {
      border-radius: 999px;
      background: #0f141d;
      border: 1px solid rgba(255, 255, 255, .08);
      padding: 7px 10px;
      color: #dce3ee;
      font-size: .87rem;
    }

    .target-strip {
      margin-top: 12px;
      border-radius: var(--radius);
      border: 1px solid rgba(93, 214, 196, .22);
      background: #0f141d;
      padding: 12px;
    }

    .target-strip h3 {
      margin: 0;
      color: var(--accent-2);
      font-size: 1rem;
    }

    .target-strip .poke-list {
      margin-top: 10px;
    }

    .target-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .target-card {
      min-height: 100px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      background: #151b25;
      padding: 8px 6px;
      display: grid;
      grid-template-rows: 52px auto auto;
      justify-items: center;
      align-items: center;
      gap: 4px;
      text-align: center;
    }

    .target-card img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      image-rendering: auto;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, .28));
    }

    .target-card b {
      max-width: 100%;
      color: #eef4fb;
      font-size: .7rem;
      line-height: 1.08;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .target-card span {
      border-radius: 999px;
      background: rgba(255, 203, 76, .16);
      color: var(--accent);
      border: 1px solid rgba(255, 203, 76, .25);
      padding: 2px 7px;
      font-size: .7rem;
      font-weight: 900;
    }
    .compare-actions {
      display: grid;
      gap: 10px;
    }

    .compare-toggle, .compare-run {
      min-height: 44px;
      border: 0;
      border-radius: var(--radius);
      background: var(--accent-2);
      color: #071512;
      font-weight: 900;
      cursor: pointer;
      padding: 0 16px;
    }

    .compare-box[hidden] { display: none; }

    .compare-box {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .compare-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
    }

    .compare-row input {
      min-height: 44px;
    }

    .compare-result {
      min-height: 44px;
    }

    .compare-card {
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, .08);
      background: #0f141d;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .compare-card.win { border-color: rgba(114, 227, 157, .38); }
    .compare-card.lose { border-color: rgba(255, 107, 122, .42); }
    .compare-card.even { border-color: rgba(255, 203, 76, .35); }

    .compare-head {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
    }

    .compare-head strong {
      font-size: 1.05rem;
    }

    .compare-face {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) 54px;
      gap: 10px;
      align-items: center;
    }

    .compare-face img {
      width: 54px;
      height: 54px;
      object-fit: contain;
    }

    .compare-vs {
      color: var(--muted);
      text-align: center;
      font-weight: 900;
      font-size: .78rem;
    }

    .tips {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .tip {
      background: #0f141d;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      padding: 12px;
      min-height: 94px;
    }

    .tip b {
      display: block;
      margin-bottom: 6px;
      color: var(--accent);
    }

    .view-tabs {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .view-tab {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 28, 36, .78);
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
      padding: 0 14px;
    }

    .view-tab.active {
      background: var(--accent);
      border-color: transparent;
      color: #18140a;
    }

    .league-view {
      grid-column: 1 / -1;
      display: grid;
      gap: 14px;
    }

    .league-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }


    .league-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .league-refresh {
      min-height: 34px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: var(--radius);
      background: rgba(255,255,255,.08);
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
      padding: 0 12px;
    }

    .league-refresh:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .league-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .team-card {
      background: rgba(23, 28, 36, .86);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .team-card h3 {
      margin: 0;
      color: var(--accent-2);
      font-size: 1rem;
    }

    .team-members {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .team-member {
      border-radius: var(--radius);
      background: #0f141d;
      border: 1px solid rgba(255, 255, 255, .08);
      padding: 10px 8px;
      display: grid;
      justify-items: center;
      gap: 6px;
      text-align: center;
      min-height: 132px;
    }

    .team-member img {
      width: 58px;
      height: 58px;
      object-fit: contain;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, .28));
    }

    .team-member b {
      font-size: .78rem;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .team-member small {
      color: var(--muted);
      font-size: .7rem;
    }

    .team-types {
      display: flex;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .team-types .chip {
      min-height: 22px;
      padding: 3px 7px;
      font-size: .64rem;
    }

    .evaluator-view {
      grid-column: 1 / -1;
      display: grid;
      gap: 14px;
    }

    .evaluator-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .scanner-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
    }

    .scanner-controls {
      display: grid;
      grid-template-columns: minmax(150px, .45fr) minmax(220px, 1fr);
      gap: 10px;
      align-items: end;
    }

    .scanner-file {
      position: relative;
      overflow: hidden;
    }

    .scanner-file input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .evaluator-field.scanner-file label {
      min-height: 42px;
      border: 0;
      border-radius: var(--radius);
      padding: 0 14px;
      background: var(--accent-2);
      color: #0b1817;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: none;
      font-size: .85rem;
      letter-spacing: 0;
    }

    .scanner-status {
      grid-column: 1 / -1;
      color: var(--muted);
      min-height: 20px;
      font-size: .78rem;
    }

    .scanner-preview {
      width: 92px;
      height: 92px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, .1);
      background: #0f141d;
      object-fit: cover;
    }

    .evaluator-member {
      background: rgba(23, 28, 36, .86);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .evaluator-member-head {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 58px;
    }

    .evaluator-member-head img {
      width: 54px;
      height: 54px;
      object-fit: contain;
    }

    .evaluator-member-head b,
    .evaluator-member-head small {
      display: block;
      overflow-wrap: anywhere;
    }

    .evaluator-member-head small {
      color: var(--muted);
      margin-top: 3px;
    }

    .evaluator-field {
      display: grid;
      gap: 6px;
    }

    .evaluator-field label {
      color: var(--muted);
      font-size: .72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .evaluator-field input,
    .evaluator-field select {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: var(--radius);
      background: #0f141d;
      color: var(--text);
      padding: 0 11px;
      outline: none;
    }

    .evaluator-field input:focus,
    .evaluator-field select:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(93, 214, 196, .14);
    }

    .evaluator-field select:disabled {
      color: #77808d;
      cursor: not-allowed;
    }

    .evaluator-ivs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .evaluator-actions {
      display: flex;
      justify-content: flex-end;
    }

    .evaluator-actions .go {
      min-width: 210px;
    }

    .evaluation-results {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .evaluation-card {
      background: #0f141d;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .evaluation-score {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .evaluation-score strong {
      color: var(--accent);
      font-size: 2rem;
    }

    .evaluation-meter {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, .09);
    }

    .evaluation-meter span {
      display: block;
      width: var(--score);
      height: 100%;
      background: var(--meter);
    }

    .evaluation-details {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .evaluation-detail {
      background: rgba(255, 255, 255, .04);
      border-radius: var(--radius);
      padding: 9px;
      text-align: center;
    }

    .evaluation-detail b,
    .evaluation-detail small {
      display: block;
    }

    .evaluation-detail small {
      color: var(--muted);
      font-size: .66rem;
      margin-bottom: 3px;
    }

    .evaluation-alerts {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: .78rem;
    }

    .evaluation-alerts .bad-note {
      color: #ffb8c0;
    }

    .empty {
      grid-column: 1 / -1;
      min-height: 430px;
      display: grid;
      place-items: center;
      padding: 30px;
      text-align: center;
    }

    .empty-inner {
      max-width: 650px;
    }

    .empty h2 {
      font-size: clamp(2rem, 5vw, 4rem);
      margin-bottom: 12px;
    }

    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, .18);
      border-top-color: var(--accent);
      animation: spin .8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    .error {
      color: #ffd8dc;
      background: rgba(255, 107, 122, .12);
      border: 1px solid rgba(255, 107, 122, .28);
      border-radius: var(--radius);
      padding: 12px;
      margin-top: 12px;
      display: none;
    }

    .error.show { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) {
      header, main { grid-template-columns: 1fr; }
      .status-pill { justify-self: start; }
      .hero-card { order: -1; }
      .tips { grid-template-columns: 1fr; }
      .target-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      .league-grid { grid-template-columns: 1fr; }
      .evaluator-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 620px) {
      .app { width: min(100% - 20px, 1180px); padding-top: 18px; }
      .brand { align-items: flex-start; }
      .mark { width: 46px; height: 46px; }
      .search-zone, .move-grid, .matrix, .compare-row, .team-members { grid-template-columns: 1fr; }
      .go, .compare-run { width: 100%; }

    const aliases = new Map([

    const scannerState = {

    let ocrLibraryReady = null;

    function normalize(value = "") {
      return String(value)
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[._]/g, "-")
        .replace(/['’]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function slugify(value = "") {
      return normalize(value).replace(/\s+/g, "-");
    }

    function typeSlug(value = "") {
      return String(value)
        .replace(/^POKEMON_TYPE_/i, "")
        .toLowerCase()
        .replace(/_/g, "-");
    }

    function displayName(name = "") {
      return String(name)
        .split("-")
        .filter(Boolean)
        .map(part => part.charAt(0).toUpperCase() + part.slice(1))
        .join(" ");
    }

    function goName(pokemon) {
      return pokemon?.names?.English || pokemon?.id || "Pokémon";
    }

    function goDisplayName(pokemon) {
      const base = goName(pokemon);
      const form = String(pokemon?.formId || "").replace(`${pokemon?.id || ""}_`, "");
      if (!form || form === pokemon?.id || form === "NORMAL") return base;
      const formLabel = displayName(slugify(form));
      if (normalize(base).includes(normalize(formLabel))) return base;
      return `${base} ${formLabel}`;
    }

    function pokemonTypes(pokemon) {
      return [pokemon.primaryType, pokemon.secondaryType]
        .filter(Boolean)
        .map(item => typeSlug(item.type || item.names?.English || item.typeName));
    }

    function moveType(move) {
      return typeSlug(move?.type?.type || move?.type?.names?.English || "normal");
    }

    function fallbackMoveNamePtBR(move) {
      return String(move?.id || "golpe")
        .replace(/_FAST$/i, "")
        .toLowerCase()
        .split("_")
        .filter(Boolean)
        .map(part => fallbackMoveWords[part] || displayName(part))
        .join(" ")
        .replace(/^./, char => char.toUpperCase());
    }

    function moveName(move) {
      const english = move?.names?.English || displayName(slugify(move?.id || "Golpe"));
      return move?.names?.Portuguese || move?.names?.["Portuguese (Brazil)"] || moveTranslationsPtBR[english] || fallbackMoveNamePtBR(move);
    }

    function addIndex(key, pokemon) {
      const normalized = slugify(key);
      if (normalized && !pokemonIndex.has(normalized)) pokemonIndex.set(normalized, pokemon);
    }

    function apiName(value) {
      const term = normalize(value);
      if (!term) return "";
      if (aliases.has(term)) return aliases.get(term);
      const compact = term.replace(/\s+/g, "-");
      return aliases.get(compact) || compact;
    }

    function regionalSearchTerms(formSlug) {
      const terms = [];
      if (formSlug.includes("hisuian")) terms.push("hisui", "de hisui");
      if (formSlug.includes("alolan")) terms.push("alola", "de alola");
      if (formSlug.includes("galarian")) terms.push("galar", "de galar");
      if (formSlug.includes("paldean")) terms.push("paldea", "de paldea");
      return terms.join(" ");
    }

    function findPokemon(term) {
      const compact = slugify(term);
      const exact = pokemonIndex.get(term) || pokemonIndex.get(compact);
      if (exact) return exact;
      const normalized = normalize(term);
      const hit = pokemonList.find(p => p.search.includes(normalized) || p.name.includes(compact));
      return hit?.pokemon || null;
    }

    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Falha ao carregar ${url}`);
      return res.json();
    }

    async function loadList() {
      dataReady = (async () => {
        try {
          const [pokedex, types] = await Promise.all([
            fetchJson(`${GO_API}/pokedex.json`),
            fetchJson(`${GO_API}/types.json`)
          ]);

          typeData = new Map(types.map(type => [typeSlug(type.type), {
            weakFrom: (type.doubleDamageFrom || []).map(typeSlug),
            resistFrom: (type.halfDamageFrom || []).map(typeSlug),
            immuneFrom: (type.noDamageFrom || []).map(typeSlug)
          }]));

          const allPokemon = pokedex.flatMap(pokemon => [
            pokemon,
            ...Object.values(pokemon.regionForms || {})
          ]);

          pokemonIndex = new Map();
          pokemonList = allPokemon.map((pokemon, index) => {
            const name = goName(pokemon);
            const label = goDisplayName(pokemon);
            const slug = slugify(label);
            const baseSlug = slugify(name);
            const idSlug = slugify(pokemon.id);
            const formSlug = slugify(String(pokemon.formId || "").replace(/_/g, " "));
            const entry = {
              pokemon,
              name: slug,
              label,
              search: normalize(`${label} ${name} ${pokemon.id} ${pokemon.formId} ${pokemon.dexNr} ${regionalSearchTerms(formSlug)}`),
              index: pokemon.dexNr || index + 1
            };
            [slug, baseSlug, idSlug, formSlug, `${baseSlug}-${formSlug}`].forEach(key => addIndex(key, pokemon));
            if (!pokemonIndex.has(String(pokemon.dexNr))) pokemonIndex.set(String(pokemon.dexNr), pokemon);
            return entry;
          }).sort((a, b) => a.index - b.index || a.label.localeCompare(b.label));

          aliases.forEach((target, alias) => {
            const pokemon = pokemonIndex.get(target);
            if (pokemon) addIndex(alias, pokemon);
          });

          statusEl.textContent = `${pokemonList.length.toLocaleString("pt-BR")} opções prontas`;
        } catch (err) {
          statusEl.textContent = "Busca online indisponível";
          throw err;
        }
      })();
      return dataReady;
    }

    function suggestionMatches(value) {
      const term = normalize(value);
      if (!term || term.length < 2) return [];
      const aliasHits = [...aliases.entries()]
        .filter(([label]) => label.includes(term))
        .map(([label, name]) => {
          const pokemon = pokemonIndex.get(name);
          return pokemon ? { pokemon, name, label: `${goDisplayName(pokemon)} (${label})`, index: "forma" } : null;
        })
        .filter(Boolean);
      const hits = pokemonList
        .filter(p => p.search.includes(term) || String(p.index) === term)
        .slice(0, 8);
      return [...aliasHits, ...hits]
        .filter((hit, idx, arr) => arr.findIndex(x => x.pokemon === hit.pokemon) === idx)
        .slice(0, 8);
    }

    function suggestionButtons(matches) {
      return matches.map((p, idx) => `
        <button class="suggestion" type="button" data-name="${p.name}" data-label="${p.label || goDisplayName(p.pokemon)}" data-idx="${idx}" role="option">
          <span>${p.label || goDisplayName(p.pokemon)}</span>
          <small>${typeof p.index === "number" ? "#" + String(p.index).padStart(3, "0") : p.index}</small>
        </button>
      `).join("");
    }

    function renderSuggestions() {
      activeSuggestion = -1;
      const merged = suggestionMatches(input.value);
      if (!merged.length) {
        suggestionsEl.classList.remove("show");
        suggestionsEl.innerHTML = "";
        return;
      }
      suggestionsEl.innerHTML = suggestionButtons(merged);
      suggestionsEl.classList.add("show");
    }

    function renderCompareSuggestions() {
      const compareInput = document.querySelector("#compareInput");
      const compareSuggestions = document.querySelector("#compareSuggestions");
      if (!compareInput || !compareSuggestions) return;
      activeCompareSuggestion = -1;
      const merged = suggestionMatches(compareInput.value);
      if (!merged.length) {
        compareSuggestions.classList.remove("show");
        compareSuggestions.innerHTML = "";
        return;
      }
      compareSuggestions.innerHTML = suggestionButtons(merged);
      compareSuggestions.classList.add("show");
    }

    function incomingEffectiveness(attackType, defenderTypes) {
      return defenderTypes.reduce((value, defenderType) => {
        const data = typeData.get(defenderType) || {};
        if (data.immuneFrom?.includes(attackType)) return value * 0;
        if (data.weakFrom?.includes(attackType)) return value * 2;
        if (data.resistFrom?.includes(attackType)) return value * 0.5;
        return value;
      }, 1);
    }

    function incomingWeaknesses(types) {
      return Object.keys(typeNames)
        .map(type => ({ type, value: incomingEffectiveness(type, types) }))
        .filter(item => item.value > 1)
        .sort((a, b) => b.value - a.value || typeNames[a.type].localeCompare(typeNames[b.type]));
    }

    function incomingResistances(types) {
      return Object.keys(typeNames)
        .map(type => ({ type, value: incomingEffectiveness(type, types) }))
        .filter(item => item.value < 1)
        .sort((a, b) => a.value - b.value || typeNames[a.type].localeCompare(typeNames[b.type]));
    }

    function scoreFastMove(move, types) {
      const combat = move.combat || {};
      const turns = Math.max(1, combat.turns || Math.round((move.durationMs || 1000) / 500));
      const power = combat.power ?? move.power ?? 0;
      const energy = combat.energy ?? move.energy ?? 0;
      const stab = types.includes(moveType(move)) ? 1.2 : 1;
      return ((power / turns) * 1.15 + (energy / turns) * 1.35) * stab;
    }

    function scoreChargedMove(move, types) {
      const combat = move.combat || {};
      const power = combat.power ?? move.power ?? 0;
      const energy = Math.abs(combat.energy ?? move.energy ?? 100) || 100;
      const stab = types.includes(moveType(move)) ? 1.2 : 1;
      const buffBonus = combat.buffs ? 8 : 0;
      return ((power / energy) * 100 + Math.max(0, 70 - energy) * 0.25 + buffBonus) * stab;
    }

    function uniqueMoves(moves) {
      const seen = new Set();
      return moves.filter(move => {
        const key = move?.id || moveName(move);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function moveId(move) {
      return String(move?.id || move?.names?.English || moveName(move));
    }

    function availableFastMoves(pokemon) {
      return uniqueMoves([
        ...Object.values(pokemon?.quickMoves || {}),
        ...Object.values(pokemon?.eliteQuickMoves || {})
      ]);
    }

    function availableChargedMoves(pokemon) {
      return uniqueMoves([
        ...Object.values(pokemon?.cinematicMoves || {}),
        ...Object.values(pokemon?.eliteCinematicMoves || {})
      ]);
    }

    function findMoveById(moves, id) {
      return moves.find(move => moveId(move) === id) || null;
    }

    function pickMoves(pokemon, types) {
      const fastMoves = uniqueMoves([
        ...Object.values(pokemon.quickMoves || {}),
        ...Object.values(pokemon.eliteQuickMoves || {})
      ]).sort((a, b) => scoreFastMove(b, types) - scoreFastMove(a, types));
      const chargedMoves = uniqueMoves([
        ...Object.values(pokemon.cinematicMoves || {}),
        ...Object.values(pokemon.eliteCinematicMoves || {})
      ]).sort((a, b) => scoreChargedMove(b, types) - scoreChargedMove(a, types));
      const fast = fastMoves[0];
      const charged = chargedMoves.slice(0, 2);
      const attackTypes = [...new Set([fast, ...charged].filter(Boolean).map(moveType))];
      const fastLabel = fast ? `${moveName(fast)} (${typeNames[moveType(fast)] || moveType(fast)})` : "Sem ataque rápido na API";
      const chargedLabel = charged.length ? charged.map(move => `${moveName(move)} (${typeNames[moveType(move)] || moveType(move)})`).join(" + ") : "Sem ataque carregado na API";
      const chargedTypes = charged.map(move => typeNames[moveType(move)]).filter(Boolean).join(" / ");
      return {
        fast: fastLabel,
        charged: chargedLabel,
        attackTypes: attackTypes.length ? attackTypes : types,
        source: "Pokémon GO API",
        note: chargedTypes ? `Cobertura: ${chargedTypes}.` : ""
      };
    }

    function targetLimit() {
      return 10;
    }

    function easyTargets(currentPokemon, attackTypes) {
      const seen = new Set();
      const limit = targetLimit();
      return pokemonList
        .map(entry => entry.pokemon)
        .filter(target => target && target.formId !== currentPokemon.formId)
        .map(target => {
          const targetTypes = pokemonTypes(target);
          const best = attackTypes
            .map(type => ({ type, value: incomingEffectiveness(type, targetTypes) }))
            .sort((a, b) => b.value - a.value)[0];
          return { pokemon: target, type: best?.type, value: best?.value || 1 };
        })
        .filter(target => target.value > 1)
        .sort((a, b) => b.value - a.value || (a.pokemon.dexNr || 9999) - (b.pokemon.dexNr || 9999))
        .filter(target => {
          const key = goDisplayName(target.pokemon).replace(/^(Alolan|Galarian|Hisuian|Paldean) /, "");
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .slice(0, limit);
    }

    function pokemonImage(pokemon) {
      return pokemon.assets?.image || pokemon.assetForms?.find(form => !form.costume)?.image || "";
    }

    function goPower(pokemon) {
      const stats = pokemon.stats || {};
      return Math.max(1, (stats.attack || 1) * Math.sqrt((stats.defense || 1) * (stats.stamina || 1)));
    }

    function bestAttackValue(attackTypes, defenderTypes) {
      return Math.max(...attackTypes.map(type => incomingEffectiveness(type, defenderTypes)), 1);
    }

    function comparePokemon(attacker, defender) {
      const attackerTypes = pokemonTypes(attacker);
      const defenderTypes = pokemonTypes(defender);
      const attackerMoves = pickMoves(attacker, attackerTypes);
      const defenderMoves = pickMoves(defender, defenderTypes);
      const attackerHit = bestAttackValue(attackerMoves.attackTypes, defenderTypes);
      const defenderHit = bestAttackValue(defenderMoves.attackTypes, attackerTypes);
      const attackerScore = goPower(attacker) * attackerHit;
      const defenderScore = goPower(defender) * defenderHit;
      const ratio = attackerScore / defenderScore;
      const state = ratio > 1.12 ? "win" : ratio < 0.89 ? "lose" : "even";
      const title = state === "win" ? "Tende a ganhar" : state === "lose" ? "Tende a perder" : "Equilibrado";
      return { attackerMoves, defenderMoves, attackerHit, defenderHit, state, title };
    }

    function setActiveView(view) {

    function estimateMaxCp(pokemon) {
      const stats = pokemon.stats || {};
      const attack = stats.attack || 1;
      const defense = stats.defense || 1;
      const stamina = stats.stamina || 1;
      const maxLevelMultiplier = 0.8403;
      return Math.floor((attack * Math.sqrt(defense) * Math.sqrt(stamina) * maxLevelMultiplier * maxLevelMultiplier) / 10);
    }

    function leagueFitScore(pokemon, cap) {
      const stats = pokemon.stats || {};
      const attack = stats.attack || 1;
      const defense = stats.defense || 1;
      const stamina = stats.stamina || 1;
      const maxCp = estimateMaxCp(pokemon);
      if (maxCp < cap * 0.72) return 0;
      const cpRatio = Math.min(1, maxCp / cap);
      const bulk = Math.sqrt(defense * stamina) / Math.max(60, attack);
      const types = pokemonTypes(pokemon);
      const moves = pickMoves(pokemon, types);
      const coverage = new Set(moves.attackTypes).size;
      const weaknesses = incomingWeaknesses(types).length;
      const resistances = incomingResistances(types).length;
      return cpRatio * 100 + bulk * 18 + coverage * 8 + resistances * 3 - weaknesses * 2;
    }

    function leagueCandidates(cap) {
      const seen = new Set();
      return pokemonList
        .map(entry => entry.pokemon)
        .filter(pokemon => pokemon?.stats && pokemon.quickMoves && pokemon.cinematicMoves)
        .map(pokemon => ({ pokemon, score: leagueFitScore(pokemon, cap), maxCp: estimateMaxCp(pokemon) }))
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score)
        .filter(item => {
          const key = goDisplayName(item.pokemon).replace(/^(Alolan|Galarian|Hisuian|Paldean) /, "");
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .slice(0, 60);
    }

    function teamPenalty(team) {
      const weakCounts = new Map();
      const attackTypes = new Set();
      team.forEach(member => {
        const types = pokemonTypes(member.pokemon);
        incomingWeaknesses(types).forEach(item => weakCounts.set(item.type, (weakCounts.get(item.type) || 0) + 1));
        pickMoves(member.pokemon, types).attackTypes.forEach(type => attackTypes.add(type));
      });
      const sharedWeaknessPenalty = [...weakCounts.values()].filter(count => count > 1).reduce((sum, count) => sum + count * 12, 0);
      return sharedWeaknessPenalty - attackTypes.size * 7;
    }

    function coreLeagueItem(pokemon, cap) {
      return { pokemon, score: Math.max(35, leagueFitScore(pokemon, cap)), maxCp: estimateMaxCp(pokemon) };
    }

    function partnerValue(candidate, team) {
      const candidateTypes = pokemonTypes(candidate.pokemon);
      const candidateMoves = pickMoves(candidate.pokemon, candidateTypes);
      const coverage = team.reduce((sum, member) => {
        const memberTypes = pokemonTypes(member.pokemon);
        const memberMoves = pickMoves(member.pokemon, memberTypes);
        return sum + bestAttackValue(candidateMoves.attackTypes, memberTypes) * 10 + bestAttackValue(memberMoves.attackTypes, candidateTypes) * 6;
      }, 0);
      return candidate.score + coverage - teamPenalty([...team, candidate]);
    }

    function generateLeagueTeams(cap, corePokemon, page = 0) {
      const core = coreLeagueItem(corePokemon, cap);
      const candidates = leagueCandidates(cap).filter(item => item.pokemon.formId !== corePokemon.formId);
      const firstPartners = candidates
        .map(item => ({ item, value: partnerValue(item, [core]) }))
        .sort((a, b) => b.value - a.value)
        .slice(0, 36)
        .map(entry => entry.item);
      const teams = [];
      firstPartners.forEach(first => {
        const seconds = candidates
          .filter(item => item.pokemon.formId !== first.pokemon.formId)
          .map(item => ({ item, value: partnerValue(item, [core, first]) }))
          .sort((a, b) => b.value - a.value)
          .slice(0, 4)
          .map(entry => entry.item);
        seconds.forEach(second => {
          const team = [core, first, second];
          teams.push({ members: team, score: team.reduce((sum, item) => sum + item.score, 0) - teamPenalty(team) });
        });
      });
      const unique = [];
      const seen = new Set();
      teams.sort((a, b) => b.score - a.score).forEach(team => {
        const key = team.members.map(item => item.pokemon.formId).sort().join("|");
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(team);
        }
      });
      if (unique.length <= 6) return unique;
      const start = ((page * 6) % unique.length + unique.length) % unique.length;
      return [...unique.slice(start), ...unique.slice(0, start)].slice(0, 6);
    }

    function loadOcrLibrary() {
      if (window.Tesseract) return Promise.resolve(window.Tesseract);
      if (ocrLibraryReady) return ocrLibraryReady;
      ocrLibraryReady = new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/tesseract.js@7/dist/tesseract.min.js";
        script.onload = () => window.Tesseract ? resolve(window.Tesseract) : reject(new Error("OCR indisponível"));
        script.onerror = () => reject(new Error("Não foi possível carregar o OCR"));
        document.head.appendChild(script);
      });
      return ocrLibraryReady;
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function imageFromUrl(url) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = url;
      });
    }

    function imageCanvas(image, maxWidth = 1400) {
      const scale = Math.min(1, maxWidth / image.naturalWidth);
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.round(image.naturalWidth * scale));
      canvas.height = Math.max(1, Math.round(image.naturalHeight * scale));
      canvas.getContext("2d", { willReadFrequently: true }).drawImage(image, 0, 0, canvas.width, canvas.height);
      return canvas;
    }

    function levenshtein(a, b) {
      const previous = Array.from({ length: b.length + 1 }, (_, index) => index);
      for (let i = 1; i <= a.length; i++) {
        let diagonal = previous[0];
        previous[0] = i;
        for (let j = 1; j <= b.length; j++) {
          const above = previous[j];
          previous[j] = Math.min(
            previous[j] + 1,
            previous[j - 1] + 1,
            diagonal + (a[i - 1] === b[j - 1] ? 0 : 1)
          );
          diagonal = above;
        }
      }
      return previous[b.length];
    }

    function findPokemonFromOcr(text) {
      const normalizedText = normalize(text);
      const exact = pokemonList
        .filter(entry => normalizedText.includes(normalize(entry.label)) || normalizedText.includes(normalize(goName(entry.pokemon))))
        .sort((a, b) => normalize(b.label).length - normalize(a.label).length)[0];
      if (exact) return exact.pokemon;
      const fragments = String(text).split(/\r?\n|[|,;:]/).map(normalize).filter(value => value.length >= 4 && value.length <= 30);
      let best = null;
      pokemonList.forEach(entry => {
        const label = normalize(entry.label);
        fragments.forEach(fragment => {
          const distance = levenshtein(fragment, label);
          const similarity = 1 - distance / Math.max(fragment.length, label.length);
          if (similarity >= .72 && (!best || similarity > best.similarity)) best = { pokemon: entry.pokemon, similarity };
        });
      });
      return best?.pokemon || null;
    }

    function parseCpFromOcr(text) {
      const direct = String(text).match(/\b(?:PC|CP)\s*[:.]?\s*([0-9][0-9 .]{1,5})/i);
      if (!direct) return null;
      const value = Number(direct[1].replace(/\D/g, ""));
      return value >= 10 && value <= 10000 ? value : null;
    }

    function isIvFillPixel(r, g, b) {
      return r >= 155 && r > g * 1.12 && g >= 35 && g <= 205 && b <= 145;
    }

    function isIvTrackPixel(r, g, b) {
      const spread = Math.max(r, g, b) - Math.min(r, g, b);
      return isIvFillPixel(r, g, b) || (r >= 105 && g >= 105 && b >= 105 && spread <= 55);
    }

    function detectIvBars(sourceCanvas) {
      const scale = Math.min(1, 900 / sourceCanvas.width);
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(sourceCanvas.width * scale);
      canvas.height = Math.round(sourceCanvas.height * scale);
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.drawImage(sourceCanvas, 0, 0, canvas.width, canvas.height);
      const { width, height } = canvas;
      const pixels = ctx.getImageData(0, 0, width, height).data;
      const startY = Math.floor(height * .32);
      const endY = Math.floor(height * .94);
      const rows = [];
      for (let y = startY; y < endY; y++) {
        let count = 0;
        let minX = width;
        let maxX = 0;
        for (let x = 0; x < width; x++) {
          const index = (y * width + x) * 4;
          if (isIvFillPixel(pixels[index], pixels[index + 1], pixels[index + 2])) {
            count++;
            minX = Math.min(minX, x);
            maxX = Math.max(maxX, x);
          }
        }
        if (count > width * .035 && maxX - minX > width * .15) rows.push({ y, minX, maxX });
      }
      const bands = [];
      rows.forEach(row => {
        const band = bands[bands.length - 1];
        if (band && row.y <= band.endY + 2) {
          band.endY = row.y;
          band.minX = Math.min(band.minX, row.minX);
          band.maxX = Math.max(band.maxX, row.maxX);
        } else {
          bands.push({ startY: row.y, endY: row.y, minX: row.minX, maxX: row.maxX });
        }
      });
      const candidates = bands
        .filter(band => band.endY - band.startY <= Math.max(36, height * .035))
        .sort((a, b) => a.startY - b.startY)
        .slice(-3);
      if (candidates.length !== 3) return null;
      const measurements = candidates.map(band => {
        const y = Math.round((band.startY + band.endY) / 2);
        let fillStart = width;
        let fillEnd = 0;
        for (let x = 0; x < width; x++) {
          const index = (y * width + x) * 4;
          if (isIvFillPixel(pixels[index], pixels[index + 1], pixels[index + 2])) {
            fillStart = Math.min(fillStart, x);
            fillEnd = Math.max(fillEnd, x);
          }
        }
        const sampleX = Math.min(width - 1, fillEnd + Math.max(2, Math.round(width * .004)));
        const sampleIndex = (y * width + sampleX) * 4;
        const sample = [pixels[sampleIndex], pixels[sampleIndex + 1], pixels[sampleIndex + 2]];
        let trackEnd = fillEnd;
        let gap = 0;
        for (let x = fillEnd + 1; x < Math.min(width, fillStart + width * .65); x++) {
          const index = (y * width + x) * 4;
          const distance = Math.abs(pixels[index] - sample[0]) + Math.abs(pixels[index + 1] - sample[1]) + Math.abs(pixels[index + 2] - sample[2]);
          if (isIvFillPixel(pixels[index], pixels[index + 1], pixels[index + 2]) || distance < 85) {
            trackEnd = x;
            gap = 0;
          } else if (++gap > Math.max(4, width * .006)) {
            break;
          }
        }
        return { fillStart, fillEnd, trackEnd };
      });
      const median = values => [...values].sort((a, b) => a - b)[Math.floor(values.length / 2)];
      const commonStart = median(measurements.map(item => item.fillStart));
      const commonEnd = median(measurements.map(item => item.trackEnd));
      const fullWidth = Math.max(1, commonEnd - commonStart + 1);
      const values = measurements.map(item => clamp(Math.round(((item.fillEnd - item.fillStart + 1) / fullWidth) * 15), 0, 15));
      return {
        attack: values[0],
        defense: values[1],
        stamina: values[2],
        confidence: values.every(value => Number.isFinite(value)) ? "estimada" : "baixa"
      };
    }

    async function scanPokemonScreenshot(file) {
      if (!file || scannerState.busy) return;
      scannerState.busy = true;
      scannerState.status = "Preparando imagem...";
      scannerState.result = null;
      scannerState.preview = await fileToDataUrl(file);
      renderTeamEvaluator();
      try {
        await dataReady;
        const image = await imageFromUrl(scannerState.preview);
        const canvas = imageCanvas(image);
        const ivs = detectIvBars(canvas);
        const Tesseract = await loadOcrLibrary();
        const worker = await Tesseract.createWorker("eng", 1, {
          logger: message => {
            if (message.status === "recognizing text") {
              scannerState.status = `Lendo texto... ${Math.round((message.progress || 0) * 100)}%`;
              const status = document.querySelector("#scannerStatus");
              if (status) status.textContent = scannerState.status;
            }
          }
        });
        const recognition = await worker.recognize(canvas);
        await worker.terminate();
        const text = recognition.data?.text || "";
        const pokemon = findPokemonFromOcr(text);
        const cp = parseCpFromOcr(text);
        const member = evaluatorMembers[scannerState.slot];
        if (pokemon) setEvaluatorPokemon(scannerState.slot, pokemon, false);
        if (cp) member.cp = cp;
        if (ivs) {
          member.ivAttack = ivs.attack;
          member.ivDefense = ivs.defense;
          member.ivStamina = ivs.stamina;
        }
        const found = [
          pokemon ? goDisplayName(pokemon) : null,
          cp ? `${cp} PC` : null,
          ivs ? `IV ${ivs.attack}/${ivs.defense}/${ivs.stamina} (estimado)` : null
        ].filter(Boolean);
        scannerState.status = found.length ? `Preenchido: ${found.join(" · ")}.` : "Não consegui identificar os dados. Use uma captura da tela de avaliação e preencha manualmente.";
      } catch (error) {
        scannerState.status = "Não foi possível ler a imagem. Confira sua conexão ou preencha os dados manualmente.";
      } finally {
        scannerState.busy = false;
        renderTeamEvaluator();
      }
    }

    function teamSuggestionButtons(matches, slot) {
      return matches.map((entry, idx) => `
        <button class="suggestion team-eval-suggestion" type="button" data-slot="${slot}" data-form="${encodeURIComponent(entry.pokemon.formId || entry.pokemon.id || entry.name)}" data-idx="${idx}" role="option">
          <span>${entry.label || goDisplayName(entry.pokemon)}</span>
          <small>${typeof entry.index === "number" ? "#" + String(entry.index).padStart(3, "0") : entry.index}</small>
        </button>
      `).join("");
    }

    function findPokemonByForm(value) {
      const decoded = decodeURIComponent(value || "");
      return pokemonList.find(entry => String(entry.pokemon.formId || entry.pokemon.id) === decoded)?.pokemon || null;
    }

    function renderTeamSuggestions(inputEl) {
      const slot = Number(inputEl.dataset.slot);
      const suggestions = document.querySelector(`#teamSuggestions${slot}`);
      if (!suggestions) return;
      const matches = suggestionMatches(inputEl.value);
      suggestions.innerHTML = teamSuggestionButtons(matches, slot);
      suggestions.classList.toggle("show", matches.length > 0);
    }

    function setEvaluatorPokemon(slot, pokemon, rerender = true) {
      const member = evaluatorMembers[slot];
      if (!member || !pokemon) return;
      const types = pokemonTypes(pokemon);
      const fastMoves = availableFastMoves(pokemon).sort((a, b) => scoreFastMove(b, types) - scoreFastMove(a, types));
      const chargedMoves = availableChargedMoves(pokemon).sort((a, b) => scoreChargedMove(b, types) - scoreChargedMove(a, types));
      member.pokemon = pokemon;
      member.fastId = moveId(fastMoves[0]);
      member.chargedId1 = moveId(chargedMoves[0]);
      member.chargedId2 = moveId(chargedMoves[1] || chargedMoves[0]);
      member.cp = member.cp || Math.min(1500, estimateMaxCp(pokemon));
      if (rerender) renderTeamEvaluator();
    }

    function selectedEvaluatorMoves(member) {
      const fastMoves = availableFastMoves(member.pokemon);
      const chargedMoves = availableChargedMoves(member.pokemon);
      return {
        fast: findMoveById(fastMoves, member.fastId) || fastMoves[0] || null,
        charged: [
          findMoveById(chargedMoves, member.chargedId1),
          findMoveById(chargedMoves, member.chargedId2)
        ].filter(Boolean)
      };
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function evaluatorMoveQuality(member) {
      const types = pokemonTypes(member.pokemon);
      const fastMoves = availableFastMoves(member.pokemon);
      const chargedMoves = availableChargedMoves(member.pokemon);
      const chosen = selectedEvaluatorMoves(member);
      const bestFast = Math.max(...fastMoves.map(move => scoreFastMove(move, types)), 1);
      const bestCharged = chargedMoves.map(move => scoreChargedMove(move, types)).sort((a, b) => b - a);
      const fastQuality = chosen.fast ? scoreFastMove(chosen.fast, types) / bestFast : 0;
      const chargedQuality = chosen.charged.reduce((sum, move, idx) => sum + scoreChargedMove(move, types) / Math.max(bestCharged[idx] || bestCharged[0] || 1, 1), 0) / 2;
      return clamp((fastQuality * .45 + chargedQuality * .55) * 100, 0, 100);
    }

    function evaluatorAttackTypes(member) {
      const moves = selectedEvaluatorMoves(member);
      return [...new Set([moves.fast, ...moves.charged].filter(Boolean).map(moveType))];
    }

    function teamSynergyScore(members) {
      const weaknessCounts = new Map();
      const attackTypes = new Set();
      members.forEach(member => {
        incomingWeaknesses(pokemonTypes(member.pokemon)).forEach(item => {
          weaknessCounts.set(item.type, (weaknessCounts.get(item.type) || 0) + 1);
        });
        evaluatorAttackTypes(member).forEach(type => attackTypes.add(type));
      });
      const shared = [...weaknessCounts.values()].reduce((sum, count) => sum + (count > 1 ? (count - 1) * 10 : 0), 0);
      return clamp(64 + attackTypes.size * 6 - shared, 10, 100);
    }

    function evaluateTeamForLeague(members, cap) {
      const valid = members.filter(member => member.pokemon && Number(member.cp) > 0);
      const alerts = [];
      if (valid.length !== 3) {
        return { score: 0, coverage: 0, readiness: 0, synergy: 0, alerts: ["Preencha os três Pokémon, PC, golpes e IVs."] };
      }
      const overCap = valid.filter(member => Number(member.cp) > cap);
      overCap.forEach(member => alerts.push(`${goDisplayName(member.pokemon)} está acima de ${cap} PC.`));
      const readiness = valid.reduce((sum, member) => {
        const cp = Number(member.cp);
        const cpUse = cp > cap ? 0 : clamp(cp / cap, .25, 1);
        const ivTotal = clamp((Number(member.ivAttack) + Number(member.ivDefense) + Number(member.ivStamina)) / 45, 0, 1);
        const ivBalance = clamp((Number(member.ivDefense) + Number(member.ivStamina)) / 30, 0, 1);
        const moveQuality = evaluatorMoveQuality(member) / 100;
        return sum + (cpUse * 48 + moveQuality * 37 + (ivTotal * .45 + ivBalance * .55) * 15);
      }, 0) / 3;
      const benchmarks = leagueCandidates(cap).slice(0, 42);
      const coverage = benchmarks.reduce((sum, opponent) => {
        const opponentTypes = pokemonTypes(opponent.pokemon);
        const opponentAttacks = pickMoves(opponent.pokemon, opponentTypes).attackTypes;
        const bestMatch = Math.max(...valid.map(member => {
          if (Number(member.cp) > cap) return .15;
          const memberTypes = pokemonTypes(member.pokemon);
          const offense = bestAttackValue(evaluatorAttackTypes(member), opponentTypes);
          const incoming = bestAttackValue(opponentAttacks, memberTypes);
          const quality = .78 + evaluatorMoveQuality(member) / 455;
          const cpFactor = .72 + clamp(Number(member.cp) / cap, 0, 1) * .28;
          return (offense / Math.max(incoming, .25)) * quality * cpFactor;
        }));
        return sum + clamp(50 + Math.log2(Math.max(bestMatch, .1)) * 27, 10, 94);
      }, 0) / Math.max(benchmarks.length, 1);
      const synergy = teamSynergyScore(valid);
      let score = coverage * .55 + readiness * .3 + synergy * .15;
      if (overCap.length) score -= overCap.length * 18;
      score = Math.round(clamp(score, 0, 97));
      const sharedWeaknesses = Object.keys(typeNames).filter(type => valid.filter(member => incomingEffectiveness(type, pokemonTypes(member.pokemon)) > 1).length >= 2);
      if (sharedWeaknesses.length) alerts.push(`Fraquezas repetidas: ${sharedWeaknesses.map(type => typeNames[type]).join(", ")}.`);
      const weakMoves = valid.filter(member => evaluatorMoveQuality(member) < 72);
      if (weakMoves.length) alerts.push(`Revise os golpes de: ${weakMoves.map(member => goDisplayName(member.pokemon)).join(", ")}.`);
      return {
        score,
        coverage: Math.round(coverage),
        readiness: Math.round(readiness),
        synergy: Math.round(synergy),
        alerts
      };
    }

    function evaluationLabel(score) {
      if (score >= 82) return "Muito competitiva";
      if (score >= 68) return "Competitiva";
      if (score >= 52) return "Situacional";
      return "Precisa de ajustes";
    }

    function evaluationCard(title, cap, result) {
      const meter = result.score >= 68 ? "#5dd6c4" : result.score >= 52 ? "#f4cc5d" : "#ff6b7a";
      return `
        <article class="evaluation-card">
          <div class="evaluation-score">
            <div><h3 style="margin:0">${title}</h3><span class="mini">Limite: ${cap} PC</span></div>
            <strong>${result.score}%</strong>
          </div>
          <div class="evaluation-meter" style="--score:${result.score}%;--meter:${meter}"><span></span></div>
          <b>${evaluationLabel(result.score)}</b>
          <div class="evaluation-details">
            <div class="evaluation-detail"><small>Cobertura</small><b>${result.coverage}%</b></div>
            <div class="evaluation-detail"><small>Preparação</small><b>${result.readiness}%</b></div>
            <div class="evaluation-detail"><small>Sinergia</small><b>${result.synergy}%</b></div>
          </div>
          <div class="evaluation-alerts">
            ${result.alerts.length ? result.alerts.map(alert => `<span class="bad-note">${alert}</span>`).join("") : "<span>Sem problemas importantes detectados.</span>"}
          </div>
        </article>
      `;
    }

    function evaluateConfiguredTeam() {
      const output = document.querySelector("#teamEvaluationResult");
      if (!output) return;
      const great = evaluateTeamForLeague(evaluatorMembers, 1500);
      const ultra = evaluateTeamForLeague(evaluatorMembers, 2500);
      output.innerHTML = `
        <div class="info-panel">
          <h2 class="panel-title">Estimativa de desempenho <span>Comparação com adversários da liga</span></h2>
          <div class="evaluation-results">
            ${evaluationCard("Grande Liga", 1500, great)}
            ${evaluationCard("Ultra Liga", 2500, ultra)}
          </div>
        </div>
      `;
    }

    function typeChip(type, suffix = "") {
      const color = typeColor[type] || "#cbd5e1";
      return `<span class="chip" style="background:${color}">${typeNames[type] || type}${suffix ? " " + suffix : ""}</span>`;
    }

    async function search(value = input.value) {
      setActiveView("pokedex");
      const term = apiName(value);
      if (!term) return;
      errorBox.classList.remove("show");
      suggestionsEl.classList.remove("show");
      resultEl.innerHTML = `<section class="empty"><div><span class="loader"></span>Buscando ${value}...</div></section>`;
      try {
        await dataReady;
        const pokemon = findPokemon(term);
        if (!pokemon) throw new Error("not-found");
        input.value = goDisplayName(pokemon);
        renderPokemon(pokemon);
      } catch (err) {
        resultEl.innerHTML = `<section class="empty"><div class="empty-inner"><h2>Não encontrei esse Pokémon.</h2><p class="note">Tente o nome em inglês, número da Pokédex ou uma forma como <b>arcanine de hisui</b>.</p></div></section>`;
        errorBox.textContent = "Não foi possível carregar esse Pokémon. Confira a grafia ou sua conexão.";
        errorBox.classList.add("show");
      }
    }

    input.addEventListener("input", renderSuggestions);
    input.addEventListener("keydown", event => {
      const items = [...suggestionsEl.querySelectorAll(".suggestion")];
      if (event.key === "ArrowDown" && items.length) {
        event.preventDefault();
        activeSuggestion = (activeSuggestion + 1) % items.length;
      } else if (event.key === "ArrowUp" && items.length) {
        event.preventDefault();
        activeSuggestion = (activeSuggestion - 1 + items.length) % items.length;
      } else if (event.key === "Enter") {
        event.preventDefault();
        const chosen = items[activeSuggestion];
        search(chosen?.dataset.name || input.value);
      } else if (event.key === "Escape") {
        suggestionsEl.classList.remove("show");
      }
      items.forEach((item, idx) => item.classList.toggle("active", idx === activeSuggestion));
    });

    suggestionsEl.addEventListener("click", event => {
      const btn = event.target.closest(".suggestion");
      if (btn) search(btn.dataset.name);
    });
    resultEl.addEventListener("click", event => {
      const toggle = event.target.closest(".compare-toggle");
      if (toggle) {
        const box = document.querySelector("#compareBox");
        if (box) {
          box.hidden = !box.hidden;
          if (!box.hidden) document.querySelector("#compareInput")?.focus();
        }
      }
      const compareSuggestion = event.target.closest("#compareSuggestions .suggestion");
      if (compareSuggestion) {
        const compareInput = document.querySelector("#compareInput");
        const compareSuggestions = document.querySelector("#compareSuggestions");
        if (compareInput) compareInput.value = compareSuggestion.dataset.label || compareSuggestion.dataset.name;
        if (compareSuggestions) compareSuggestions.classList.remove("show");
        runCompare();
      }
      if (event.target.closest(".compare-run")) runCompare();
      const teamSuggestion = event.target.closest(".team-eval-suggestion");
      if (teamSuggestion) {
        const slot = Number(teamSuggestion.dataset.slot);
        const pokemon = findPokemonByForm(teamSuggestion.dataset.form);
        if (pokemon) setEvaluatorPokemon(slot, pokemon);
      }
      if (event.target.closest(".evaluate-team-run")) evaluateConfiguredTeam();
      const leagueRefresh = event.target.closest(".league-refresh");
      if (leagueRefresh) {
        const view = leagueRefresh.dataset.view || currentView;
        leaguePages[view] = (leaguePages[view] || 0) + 1;
        setActiveView(view);
        renderLeague(view);
      }
    });

    resultEl.addEventListener("input", event => {
      if (event.target.closest("#compareInput")) renderCompareSuggestions();
      const teamInput = event.target.closest(".team-pokemon-input");
      if (teamInput) renderTeamSuggestions(teamInput);
      const numberInput = event.target.closest(".team-number-input");
      if (numberInput) {
        const member = evaluatorMembers[Number(numberInput.dataset.slot)];
        if (member) member[numberInput.dataset.field] = numberInput.value;
      }
    });

    resultEl.addEventListener("change", event => {
      const scannerSlot = event.target.closest("#scannerSlot");
      if (scannerSlot) {
        scannerState.slot = Number(scannerSlot.value);
        return;
      }
      const screenshot = event.target.closest("#pokemonScreenshot");
      if (screenshot?.files?.[0]) {
        scanPokemonScreenshot(screenshot.files[0]);
        return;
      }
      const select = event.target.closest(".team-move-select");
      if (!select) return;
      const member = evaluatorMembers[Number(select.dataset.slot)];
      if (member) member[select.dataset.field] = decodeURIComponent(select.value);
    });

    resultEl.addEventListener("keydown", event => {
      const teamInput = event.target.closest(".team-pokemon-input");
      if (teamInput && event.key === "Enter") {
        event.preventDefault();
        const slot = Number(teamInput.dataset.slot);
        const chosen = document.querySelector(`#teamSuggestions${slot} .team-eval-suggestion`);
        const pokemon = chosen ? findPokemonByForm(chosen.dataset.form) : findPokemon(apiName(teamInput.value));
        if (pokemon) setEvaluatorPokemon(slot, pokemon);
        return;
      }
      const compareInput = event.target.closest("#compareInput");
      if (!compareInput) return;
      const compareSuggestions = document.querySelector("#compareSuggestions");
      const items = [...(compareSuggestions?.querySelectorAll(".suggestion") || [])];
      if (event.key === "ArrowDown" && items.length) {
        event.preventDefault();
        activeCompareSuggestion = (activeCompareSuggestion + 1) % items.length;
      } else if (event.key === "ArrowUp" && items.length) {
        event.preventDefault();
        activeCompareSuggestion = (activeCompareSuggestion - 1 + items.length) % items.length;
      } else if (event.key === "Enter") {
        event.preventDefault();
        const chosen = items[activeCompareSuggestion];
        if (chosen) {
          compareInput.value = chosen.dataset.label || chosen.dataset.name;
          compareSuggestions?.classList.remove("show");
        }
        runCompare();
      } else if (event.key === "Escape") {
        compareSuggestions?.classList.remove("show");
      }
      items.forEach((item, idx) => item.classList.toggle("active", idx === activeCompareSuggestion));
    });

    document.addEventListener("click", event => {
      if (!event.target.closest(".search-zone")) suggestionsEl.classList.remove("show");
      if (!event.target.closest(".compare-box")) document.querySelector("#compareSuggestions")?.classList.remove("show");
      if (!event.target.closest(".evaluator-member")) document.querySelectorAll(".team-suggestions").forEach(el => el.classList.remove("show"));
    });

    viewTabs.forEach(tab => {
      tab.addEventListener("click", () => {
        const view = tab.dataset.view;
        setActiveView(view);
        if (view === "pokedex") {
          resultEl.innerHTML = `<section class="empty"><div class="empty-inner"><h2>Digite um Pokémon para começar.</h2><p class="note">Experimente <b>arcanine de hisui</b>, <b>charizard</b>, <b>mewtwo</b> ou um número da Pokédex. As sugestões aparecem enquanto você escreve.</p></div></section>`;
          return;
        }
        if (view === "team-eval") {
          renderTeamEvaluator();
          return;
        }
        renderLeague(view);
      });
    });
    searchBtn.addEventListener("click", () => search());
    loadList();
  </script>
</body>
</html>
